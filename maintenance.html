<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance - NovaDash Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/theme.css" rel="stylesheet">
  <link href="assets/css/layout.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <style>
    body { background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="maintenance-content">
      <div class="maintenance-icon">
        <i class="ri-tools-line"></i>
      </div>
      <h1 class="maintenance-title">We'll Be Back Soon!</h1>
      <p class="maintenance-text">We're currently performing scheduled maintenance. We'll be back online shortly. Thank you for your patience.</p>
      <div class="d-flex justify-content-center gap-3 mb-4">
        <div class="text-center">
          <div class="h3 fw-bold text-primary">03</div>
          <div class="text-muted small">Hours</div>
        </div>
        <div class="text-center">
          <div class="h3 fw-bold text-primary">24</div>
          <div class="text-muted small">Minutes</div>
        </div>
        <div class="text-center">
          <div class="h3 fw-bold text-primary">42</div>
          <div class="text-muted small">Seconds</div>
        </div>
      </div>
      <div class="d-flex gap-3 justify-content-center">
        <a href="index.html" class="btn btn-primary">
          <i class="ri-home-line"></i>
          Back to Home
        </a>
        <a href="mailto:support@reddash.com" class="btn btn-light">
          <i class="ri-mail-line"></i>
          Contact Support
        </a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    gsap.from('.maintenance-icon', { scale: 0, duration: 0.8, delay: 0.2, ease: 'back.out(1.7)' });
    gsap.from('.maintenance-title', { opacity: 0, y: 30, duration: 0.6, delay: 0.4 });
    gsap.from('.maintenance-text', { opacity: 0, y: 20, duration: 0.6, delay: 0.6 });
    gsap.from('.h3', { opacity: 0, y: 20, duration: 0.6, delay: 0.8, stagger: 0.1 });
    gsap.from('.btn', { opacity: 0, y: 20, duration: 0.6, delay: 1, stagger: 0.1 });
  </script>
</body>
</html>
