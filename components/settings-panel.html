<div class="settings-overlay"></div>
<div class="settings-panel">
  <div class="settings-header">
    <h5 class="settings-title">Settings</h5>
    <button class="settings-close">
      <i class="ri-close-line"></i>
    </button>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="settings-section-title">Theme</div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">Light Mode</div>
          <div class="settings-option-desc">Use light theme</div>
        </div>
        <label class="form-switch">
          <input type="checkbox" id="theme-light">
          <span class="form-switch-slider"></span>
        </label>
      </div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">Dark Mode</div>
          <div class="settings-option-desc">Use dark theme</div>
        </div>
        <label class="form-switch">
          <input type="checkbox" id="theme-dark">
          <span class="form-switch-slider"></span>
        </label>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Layout</div>
      <div class="layout-switcher">
        <button class="layout-option active" data-layout="default">Default</button>
        <button class="layout-option" data-layout="sidebar-collapsed">Collapsed</button>
        <button class="layout-option" data-layout="horizontal">Horizontal</button>
        <button class="layout-option" data-layout="boxed">Boxed</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Language</div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">English</div>
        </div>
        <button class="btn btn-sm btn-outline-primary language-option-btn" data-lang="en">Select</button>
      </div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">Hindi</div>
        </div>
        <button class="btn btn-sm btn-outline-primary language-option-btn" data-lang="hi">Select</button>
      </div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">Arabic (RTL)</div>
        </div>
        <button class="btn btn-sm btn-outline-primary language-option-btn" data-lang="ar">Select</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Notifications</div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">Email Notifications</div>
          <div class="settings-option-desc">Receive email updates</div>
        </div>
        <label class="form-switch">
          <input type="checkbox" checked>
          <span class="form-switch-slider"></span>
        </label>
      </div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">Push Notifications</div>
          <div class="settings-option-desc">Receive push alerts</div>
        </div>
        <label class="form-switch">
          <input type="checkbox">
          <span class="form-switch-slider"></span>
        </label>
      </div>
    </div>
  </div>
</div>
