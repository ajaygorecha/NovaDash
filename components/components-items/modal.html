<button class="btn btn-primary" data-modal-target="sample-modal">Open Modal</button>

<div class="modal-backdrop"></div>
<div class="modal" id="sample-modal">
  <div class="modal-header">
    <h5 class="modal-title">Modal Title</h5>
    <button class="modal-close">
      <i class="ri-close-line"></i>
    </button>
  </div>
  <div class="modal-body">
    <p>This is the modal body content. You can add any HTML content here including forms, images, or other components.</p>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-control" placeholder="Enter email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" placeholder="Enter password">
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-light">Cancel</button>
    <button class="btn btn-primary">Submit</button>
  </div>
</div>
