  <div class="settings-overlay"></div>
  <div class="settings-panel">
    <div class="settings-header"><h5 class="settings-title">Settings</h5><button class="settings-close"><i class="ri-close-line"></i></button></div>
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-section-title">Layout</div>
        <div class="layout-switcher">
          <button class="layout-option active" data-layout="default">Default</button>
          <button class="layout-option" data-layout="sidebar-collapsed">Collapsed</button>
        </div>
      </div>
    </div>
  </div>

  <div class="page-wrapper">
    <div class="main-content">
      <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div><h4 class="mb-1">Calendar</h4><p class="text-secondary mb-0">Manage your events and schedules</p></div>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEventModal"><i class="ri-add-line"></i> Add Event</button>
        </div>

        <div class="card">
          <div class="card-body">
            <div id="calendar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Event Modal -->
  <div class="modal fade" id="addEventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Event Title</label>
              <input type="text" class="form-control" placeholder="Enter event title">
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Start Date</label>
                <input type="date" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">End Date</label>
                <input type="date" class="form-control">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Event Color</label>
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-sm" style="background:#ff0038;width:30px;height:30px;border-radius:50%;"></button>
                <button type="button" class="btn btn-sm" style="background:#10b981;width:30px;height:30px;border-radius:50%;"></button>
                <button type="button" class="btn btn-sm" style="background:#3b82f6;width:30px;height:30px;border-radius:50%;"></button>
                <button type="button" class="btn btn-sm" style="background:#f59e0b;width:30px;height:30px;border-radius:50%;"></button>
                <button type="button" class="btn btn-sm" style="background:#8b5cf6;width:30px;height:30px;border-radius:50%;"></button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" rows="3" placeholder="Enter event description"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary">Create Event</button>
        </div>
      </div>
    </div>
  </div>

  <button class="scroll-to-top"><i class="ri-arrow-up-line"></i></button>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="assets/js/theme.js"></script>

  <script src="assets/js/animations.js"></script>
