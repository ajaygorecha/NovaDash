<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/theme.css" rel="stylesheet">
  <link href="assets/css/layout.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <style>
    body { background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-text">Oops! The page you're looking for doesn't exist. It might have been moved or deleted.</p>
      <div class="d-flex gap-3 justify-content-center">
        <a href="index.html" class="btn btn-primary">
          <i class="ri-home-line"></i>
          Back to Home
        </a>
        <a href="javascript:history.back()" class="btn btn-light">
          <i class="ri-arrow-left-line"></i>
          Go Back
        </a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    gsap.from('.error-code', { opacity: 0, y: 50, duration: 0.8, delay: 0.2 });
    gsap.from('.error-title', { opacity: 0, y: 30, duration: 0.6, delay: 0.4 });
    gsap.from('.error-text', { opacity: 0, y: 20, duration: 0.6, delay: 0.6 });
    gsap.from('.btn', { opacity: 0, y: 20, duration: 0.6, delay: 0.8, stagger: 0.1 });
  </script>
</body>
</html>
