<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NovaDash Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/theme.css" rel="stylesheet">
  <link href="assets/css/layout.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <style>
    body { background: var(--bg-body); }
    .auth-bg {
      background: linear-gradient(135deg, #0f1115 0%, #1c1f26 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .auth-bg::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,0,56,0.15) 0%, transparent 70%);
      top: -200px;
      right: -200px;
    }
    .auth-bg::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,0,56,0.1) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
    }
  </style>
</head>
<body class="auth-bg">
  <div id="three-canvas"></div>
  
  <div class="auth-card" style="position:relative;z-index:1;">
    <div class="auth-header">
      <div class="auth-logo">N</div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join us and start your journey today</p>
    </div>

    <form class="auth-form">
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" placeholder="John">
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" placeholder="Doe">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Create a password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" placeholder="Confirm your password">
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" class="form-check-input">
          <span class="form-check-label">I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a></span>
        </label>
      </div>
      <a href="index.html" class="btn btn-primary w-100 mb-3">Create Account</a>
    </form>

    <div class="auth-divider">
      <span>or continue with</span>
    </div>

    <div class="social-login">
      <button class="social-btn">
        <i class="ri-google-fill"></i>
        Google
      </button>
      <button class="social-btn">
        <i class="ri-facebook-fill"></i>
        Facebook
      </button>
    </div>

    <div class="auth-footer mt-4">
      <p>Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/three-init.js"></script>
</body>
</html>
